query SearchAccounts($query: String!) {
  searchAccounts(query: $query) {
    id
    displayName
    username
    avatarObjectKey
    schoolName
    major
    trustScore
    note
  }
}

query SearchListings($query: String!) {
  searchListings(query: $query) {
    id
    title
    type
    price
    media {
      objectKey
      url
    }
  }
}

query SearchPosts($query: String!) {
  searchPosts(query: $query) {
    postId
    content
    createdAt
    authorId
    authorDisplayName
    authorUsername
    authorAvatarObjectKey
    authorSchoolName
    linkedServiceId
    inReplyToPostId
    likesCount
    repliesCount
    likedByMe
    tags {
      id
      name
    }
    media {
      id
      fileName
      contentType
      url
      objectKey
    }
  }
}

query SearchTags($query: String!) {
  searchTags(query: $query) {
    id
    name
    isUsable
  }
}
