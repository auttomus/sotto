query GetLikedListings {
  likedListings {
    id
    title
    description
    price
    status
    type
    isUnlimited
    deliveryTimeDays
    createdAt
    updatedAt
    accountId
    isLikedByMe
    likesCount
    account {
      displayName
      major
      trustScore
      username
      avatarObjectKey
    }
    media {
      id
      fileName
      contentType
      objectKey
      url
      isPrivate
