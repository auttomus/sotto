query GetMyProfile {
  myProfile {
    id
    displayName
    username
    note
    avatarObjectKey
    avatarUrl
    trustScore
    schoolName
    major
  }
}

query GetUserProfile($username: String!) {
  profile(username: $username) {
    id
    displayName
    username
    note
    avatarObjectKey
    avatarUrl
    trustScore
    isFollowing
    followersCount
    followingCount
    schoolName
    major
  }
}

query GetListingsByAccount($accountId: ID!) {
  listingsByAccount(accountId: $accountId) {
    id
    title
    description
    price
    isUnlimited
    deliveryTimeDays
    status
    type
    media {
      id
      url
      objectKey
      fileName
      contentType
    }
  }
}

mutation FollowAccount($targetAccountId: ID!) {
  follow(targetAccountId: $targetAccountId)
}

mutation UnfollowAccount($targetAccountId: ID!) {
  unfollow(targetAccountId: $targetAccountId)
}

mutation UpdateProfile($input: UpdateProfileInput!) {
  updateProfile(input: $input) {
    id
    displayName
    username
    note
    avatarObjectKey
    avatarUrl
    major
  }
}
