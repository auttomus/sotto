query GetMyProfile {
  myProfile {
    id
    displayName
    username
    note
    avatarObjectKey
    avatarUrl
    trustScore
    schoolName
    schoolId
    major
    majorId
    followersCount
    followingCount
    bannerObjectKey
  }
}

query GetUserProfile($username: String!) {
  profile(username: $username) {
    id
    displayName
    username
    note
    avatarObjectKey
    avatarUrl
    trustScore
    isFollowing
    followersCount
    followingCount
    schoolName
    major
    bannerObjectKey
  }
}

query GetListingsByAccount($accountId: ID!) {
  listingsByAccount(accountId: $accountId) {
    id
    title
    description
    price
    isUnlimited
    deliveryTimeDays
    status
    type
    createdAt
    updatedAt
    media {
      id
      url
      objectKey
      fileName
      contentType
    }
  }
}

mutation FollowAccount($targetAccountId: ID!) {
  follow(targetAccountId: $targetAccountId)
}

mutation UnfollowAccount($targetAccountId: ID!) {
  unfollow(targetAccountId: $targetAccountId)
}

mutation UpdateProfile($input: UpdateProfileInput!) {
  updateProfile(input: $input) {
    id
    displayName
    username
    note
    avatarObjectKey
    avatarUrl
    major
    majorId
    bannerObjectKey
  }
}

query GetPostsByAccount($accountId: String!) {
  postsByAccount(accountId: $accountId) {
    postId
    content
    createdAt
    deletedAt
    authorId
    authorDisplayName
    authorUsername
    authorAvatarObjectKey
    authorSchoolName
    linkedServiceId
    inReplyToPostId
    likesCount
    repliesCount
    likedByMe
    tags {
      id
      name
    }
    media {
      id
      fileName
      contentType
      url
      objectKey
    }
  }
}

