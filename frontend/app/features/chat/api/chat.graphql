query GetConversations {
  conversations {
    id
    type
    createdAt
    updatedAt
    participants {
      accountId
      displayName
      avatarObjectKey
    }
    lastMessageContent
    lastMessageAt
    activeOrder {
      id
      status
      agreedPrice
      createdAt
    }
  }
}

query GetMessages($conversationId: ID!, $limit: Int) {
  messages(conversationId: $conversationId, limit: $limit) {
    messageId
    senderId
    content
    createdAt
    media {
      id
      fileName
      contentType
      url
    }
  }
}

mutation CreateConversation($input: CreateConversationInput!) {
  createConversation(input: $input) {
    id
    type
    createdAt
  }
}
