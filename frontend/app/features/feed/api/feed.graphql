query GetFeed($limit: Int) {
  feed(limit: $limit) {
    postId
    content
    createdAt
    editedAt
    deletedAt
    authorId
    authorDisplayName
    authorUsername
    authorAvatarObjectKey
    authorSchoolName
    linkedServiceId
    inReplyToPostId
    likesCount
    repliesCount
    likedByMe
    tags {
      id
      name
    }
    media {
      id
      fileName
      contentType
      url
      objectKey
    }
  }
}

mutation CreatePost($input: CreatePostInput!) {
  createPost(input: $input) {
    postId
    content
    createdAt
    authorId
    authorDisplayName
    authorUsername
    authorAvatarObjectKey
    authorSchoolName
    linkedServiceId
    media {
      id
      fileName
      contentType
      url
      objectKey
    }
  }
}

mutation ToggleLikePost($postId: String!) {
  toggleLikePost(postId: $postId)
}

query GetPost($postId: String!) {
  post(postId: $postId) {
    postId
    content
    createdAt
    editedAt
    deletedAt
    authorId
    authorDisplayName
    authorUsername
    authorAvatarObjectKey
    authorSchoolName
    linkedServiceId
    inReplyToPostId
    likesCount
    repliesCount
    likedByMe
    tags {
      id
      name
    }
    media {
      id
      fileName
      contentType
      url
      objectKey
    }
    ancestors {
      postId
      content
      createdAt
      editedAt
      deletedAt
      authorId
      authorDisplayName
      authorUsername
      authorAvatarObjectKey
      authorSchoolName
      linkedServiceId
      inReplyToPostId
      likesCount
      repliesCount
      likedByMe
      tags {
        id
        name
      }
      media {
        id
        fileName
        contentType
        url
        objectKey
      }
    }
  }
}

