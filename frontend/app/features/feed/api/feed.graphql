mutation UpdatePost($postId: String!, $input: UpdatePostInput!) {
  updatePost(postId: $postId, input: $input) {
    postId
    content
    createdAt
    editedAt
    deletedAt
  }
}

mutation DeletePost($postId: String!) {
  deletePost(postId: $postId)
}
