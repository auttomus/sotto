query GetFeed($limit: Int) {
  feed(limit: $limit) {
    postId
    content
    createdAt
    authorId
    authorDisplayName
    authorUsername
    authorAvatarObjectKey
    authorSchoolName
    linkedServiceId
    inReplyToPostId
    likesCount
    likedByMe
    tags {
      id
      name
    }
    media {
      id
      fileName
      contentType
      url
      objectKey
    }
  }
}

mutation CreatePost($input: CreatePostInput!) {
  createPost(input: $input) {
    postId
    content
    createdAt
    authorId
    authorDisplayName
    authorUsername
    authorAvatarObjectKey
    authorSchoolName
    linkedServiceId
    media {
      id
      fileName
      contentType
      url
      objectKey
    }
  }
}

mutation ToggleLikePost($postId: String!) {
  toggleLikePost(postId: $postId)
}

query GetPost($postId: String!) {
  post(postId: $postId) {
    postId
    content
    createdAt
    authorId
