query GetListings {
  listings {
    id
    title
    description
    price
    status
    createdAt
    updatedAt
    accountId
    isLikedByMe
    likesCount
    account {
      displayName
      major
      trustScore
      username
      avatarObjectKey
    }
  }
}

query GetListingDetail($id: ID!) {
  listing(id: $id) {
    id
    title
    description
    price
    status
    type
    isUnlimited
    deliveryTimeDays
    digitalFileObjectKey
    digitalLink
    createdAt
    updatedAt
    accountId
    isLikedByMe
    likesCount
    account {
      displayName
      major
      trustScore
      username
      avatarObjectKey
    }
    media {
      id
      fileName
      contentType
      objectKey
      url
      isPrivate
    }
    averageRating
    reviewsCount
    reviews {
      id
      rating
      comment
      createdAt
      reviewer {
        displayName
        username
        avatarObjectKey
      }
    }
  }
}

mutation CreateListing($input: CreateListingInput!) {
  createListing(input: $input) {
    id
    title
    description
    price
    status
    digitalFileObjectKey
    digitalLink
  }
}

mutation UpdateListing($id: ID!, $input: UpdateListingInput!) {
  updateListing(id: $id, input: $input) {
    id
    title
    description
    price
    status
    digitalFileObjectKey
    digitalLink
    updatedAt
  }
}

mutation DeleteListing($id: ID!) {
  deleteListing(id: $id)
}

mutation ToggleLikeListing($id: ID!) {
  toggleLikeListing(id: $id)
}
