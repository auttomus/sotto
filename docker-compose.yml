services:
  # 1. PRIMARY DATABASE
  postgres:
    image: postgres:15-alpine
    container_name: sotto_postgres
    restart: unless-stopped
    env_file:
      - ./infrastructure/.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_admin -d sotto_platform_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_net

  # 2. HIGH-VELOCITY DATABASE
  scylladb:
    image: scylladb/scylla:5.4.1
    container_name: sotto_scylla
    restart: unless-stopped
    # biar ga makan banyak ram
    command: --smp 1 --memory 768M --reserve-memory 0 --developer-mode 1
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - platform_net

  # 3. CACHE & QUEUE BROKER
  redis:
    image: redis:7-alpine
    container_name: sotto_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_net

  # 4. OBJECT STORAGE
  minio:
    image: minio/minio:latest
    container_name: sotto_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: admin_minio
      MINIO_ROOT_PASSWORD: supersecret_minio_password
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - platform_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sotto_backend
    restart: unless-stopped
    env_file:
      - ./infrastructure/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      scylladb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - platform_net

  # 6. FRONTEND (React Router)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sotto_frontend
    restart: unless-stopped
    env_file:
      - ./infrastructure/.env.docker
    depends_on:
      - backend
    networks:
      - platform_net

  # 7. REVERSE PROXY (Nginx)
  nginx:
    image: nginx:alpine
    container_name: sotto_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - platform_net

  # 8. NGROK TUNNEL (Public URL untuk Midtrans Webhook)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: sotto_ngrok
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
    env_file:
      - ./infrastructure/.env.docker
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    networks:
      - platform_net

  # 9. CLOUDFLARE TUNNEL (Akses Publik Tanpa VPS)
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: sotto_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - ./infrastructure/.env.docker
    depends_on:
      - nginx
    networks:
      - platform_net

networks:
  platform_net:
    driver: bridge

volumes:
  postgres_data:
  scylla_data:
  redis_data:
  minio_data: